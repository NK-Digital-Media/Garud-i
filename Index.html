<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garuda AI Core</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; display: flex; flex-direction: column; min-height: 100vh; }
        .header { padding: 15px; border-bottom: 2px solid #00f2ff; background: rgba(0,0,0,0.9); }
        .orb { width: 100px; height: 100px; border: 3px solid #00f2ff; border-radius: 50%; margin: 30px auto; box-shadow: 0 0 20px #00f2ff; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.4s; }
        .btn-mic { background: #00f2ff; color: #000; border: none; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,255,0.5); }
        #res-box { width: 90%; background: #0a1a1a; border: 1px solid #00f2ff; padding: 15px; margin: 20px auto; border-radius: 10px; min-height: 60px; color: #fff; text-align: left; font-size: 14px; }
        #chart { width: 95%; height: 350px; margin: 10px auto; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .thinking { border-color: #ffcc00; box-shadow: 0 0 30px #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; letter-spacing: 2px;">🦅 GARUDA AI</h1>
        <div style="font-size: 10px; color: gold;">SYSTEM READY | NEERAJ EDITION</div>
    </div>

    <div class="orb" id="orb">ACTIVE</div>

    <button class="btn-mic" onclick="startGaruda()">SAY COMMAND</button>

    <div id="res-box">
        <div id="msg">> Waiting for command...</div>
    </div>

    <div id="chart">
        <div id="tv_chart"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15", "theme": "dark", "style": "1", "container_id": "tv_chart" });

        // Nayi Key fit kar di hai
        const KEY = "AIzaSyC2VZdRxnf2aO2HAhhRjQ4-qCHoPJyshi4";

        function speak(txt) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(txt);
            ut.lang = 'hi-IN';
            window.speechSynthesis.speak(ut);
        }

        async function startGaruda() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Chrome use karein."); return; }
            
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';

            rec.onstart = () => { 
                document.getElementById('orb').innerText = "LISTENING";
                document.getElementById('msg').innerText = "> Listening...";
            };

            rec.onresult = async (e) => {
                const userMsg = e.results[0][0].transcript;
                document.getElementById('msg').innerText = "> Neeraj: " + userMsg;
                
                const orb = document.getElementById('orb');
                orb.innerText = "THINKING";
                orb.classList.add('thinking');

                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Tum Neeraj ke assistant Garuda AI ho. Chhota hindi reply do: " + userMsg }] }] })
                    });
                    
                    const d = await r.json();
                    const reply = d.candidates[0].content.parts[0].text;
                    
                    document.getElementById('msg').innerText = "> Garuda: " + reply;
                    orb.innerText = "SPEAKING";
                    orb.classList.remove('thinking');
                    speak(reply);
                    
                    setTimeout(() => { orb.innerText = "ACTIVE"; }, 4000);
                } catch (err) {
                    document.getElementById('msg').innerText = "> Connection Error. Nayi key activate ho rahi hai, 1 min ruko.";
                    orb.classList.remove('thinking');
                    orb.innerText = "RETRY";
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
